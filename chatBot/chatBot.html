<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>

    <style>
      body {
        font-family: Arial;
        margin-top: 0;
        margin-bottom: 0;
      }

      .app-container {
        display: flex;
        flex-direction: column;

        max-width: 600px;
        margin-left: auto;
        margin-right: auto;

        height: 100vh;
      }

      .chat-input-container {
        display: flex;
        margin-bottom: 60px;
      }

      .send-message-button {
        background-color: rgb(25, 135, 84);
        color: white;
        padding: 12px 20px;

        border: none;
        border-radius: 10px;

        cursor: pointer;

        font-size: 15px;
      }

      .chat-message-input {
        margin-right: 10px;
        border-radius: 10px;
        border-width: 1px;
        padding: 12px 15px;

        font-size: 15px;

        max-width: 600px;
        flex-grow: 1;
      }

      .chat-messages-container {
        flex-grow: 1;
        margin-top: 18px;
        overflow: scroll;
        scrollbar-width: none;
      }

      .chat-message-user{
        display: flex;
        justify-content: end;
        align-items: start;
      }

      .chat-message-robot {
        display: flex;
        align-items: start;
      }

      .chat-message-text {
        display: flex;
        background-color: rgb(238, 238, 238);
        margin-left: 10px;
        margin-right: 10px;
        margin-bottom: 10px;

        align-items: center;
        border-radius: 10px;

        padding: 15px 20px;
      }

      .robot-profile-image,.user-profile-image {
        width: 45px;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    
    <script type="text/babel">
      const container = document.querySelector('.js-container');

      function ChatInput ({chatMessages, setChatMessages}) {
        const [inputText, setInputText] = React.useState('');

        function saveInputText (event) {
          setInputText(event.target.value);
        }

        function sendMessageByPressingEnter(event){
          if(event.key === "Enter"){
            setInputText(event.target.value);
            sendMessage();
          }
          else if(event.key === "Escape"){
            setInputText('');
          }
        }

        function sendMessage () {
          const currentMessage = [
            ...chatMessages,
            {
              message: inputText,
              sender: 'user',
              id: crypto.randomUUID()
            }
          ];
          setChatMessages(currentMessage);

          const response = Chatbot.getResponse(inputText);

          setChatMessages([
            ...currentMessage,
            {
              message: response,
              sender: 'robot',
              id: crypto.randomUUID()
            }
          ]);

          setInputText('');
        }

        return (
          <div className="chat-input-container">
            <input 
              className="chat-message-input"
              onChange={saveInputText}
              onKeyDown={sendMessageByPressingEnter}
              placeholder="Send a message to Chatbot" 
              width="30" 
              value={inputText} 
            />
            <button 
              className="send-message-button"
              onClick={sendMessage}
            >Send</button>
          </div>
        );
      }

      function ChatMessage ({message, sender}) {
        return (
          <div className={sender === 'robot' ? 'chat-message-robot' : 'chat-message-user'}>
            {sender === 'robot' ? (<img src="images/robot.png"  className="robot-profile-image"/>) : ''}
            <div className="chat-message-text">{message}</div>
            {sender === 'user' ? (<img src="images/user.png" className="user-profile-image" />) : ''}
          </div>
        );
      }

      function ChatMessages ({chatMessages}) {
        const chatMessagesRef = React.useRef(null);

        React.useEffect(() => {
          const containerElem = chatMessagesRef.current;

          if(containerElem){
            containerElem.scrollTop = containerElem.scrollHeight;
          }
        }, [chatMessages]);

        return (
          <div className="chat-messages-container" ref={chatMessagesRef}>
            {chatMessages.map((chatMessage) => {
              return (
                  <ChatMessage message={chatMessage.message} sender={chatMessage.sender} key={chatMessage.id} />
                );
              })
            }
          </div>
        ); 
      }


      function App ()  {
        const [chatMessages, setChatMessages] = React.useState([
          { message: "Hello chatbot",
            sender: 'user',
            id: 'id1'
          },{
            message: 'Hello! How can I help you?',
            sender: 'robot',
            id: 'id2'
          },{
            message: 'Flip a coin',
            sender: 'user',
            id: 'id3'
          },{
            message: "Sure! You got heads",
            sender: 'robot',
            id: 'id4'
          }
        ]);

        return (
          <div className="app-container">
            <ChatMessages 
              chatMessages={chatMessages}  
            />
            <ChatInput 
              chatMessages={chatMessages} 
              setChatMessages={setChatMessages} 
            />
          </div>
        );
      }

      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
